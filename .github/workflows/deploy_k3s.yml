name: Ansible Bootstrap

on:
  workflow_dispatch:

jobs:
  ansible:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: ansible

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1068740763099/locations/global/workloadIdentityPools/github/providers/github
          service_account: terraform-sa@project-84ddd43d-e408-4cb9-8cb.iam.gserviceaccount.com

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r collections/requirements.yml

      - name: Show inventory graph
        run: |
          ansible-inventory -i inventory/gcp.yml --graph

      - name: Run playbook
        run: |
          ansible-playbook -i inventory/gcp.yml playbooks/base.yml
