name: Bootstrap Terraform (GCS State)

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: infra/bootstrap

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1068740763099/locations/global/workloadIdentityPools/github/providers/github
          service_account: terraform-sa@project-84ddd43d-e408-4cb9-8cb.iam.gserviceaccount.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (bootstrap)
        run: terraform init -input=false

      - name: Terraform Apply (bootstrap)
        run: terraform apply -auto-approve -input=false
